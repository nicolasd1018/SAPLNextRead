<div id="SNR-main-container" aria-label="mainPageContainer" style="display: flex; flex-direction: column;">
    <div id="search-row" style="
    display: flex;
    height: 45px;
    align-items: center;
    border-bottom: 5px solid #602983;
    ">
        <div id="search-bar-label"
        style="
        font-size: 24px;
        font-weight: bold;
        padding-left: 10px;
        padding-right: 10px;
        ">Search By</div>
        <input id="search-bar" type="text" style="height: 29px; font-size: 20px;"/>
    </div>
    <div id="book-carousel" 
         style="display: flex;
         position: absolute;
         width: 100vw;
         justify-content: space-between;
         top: calc(50% - 457px/2 + 62.5px);
         align-items: center;
         ">
         <img id="left-arrow" src="/Arrow.png" style="
        width: 149px;
        height: 121px;
        left: -18px;"/>
        <div id="book-space" style="display: flex;"></div>
        <img id="right-arrow" src="/Arrow.png" style="transform: scaleX(-1); width: 149px;
        height: 121px; right: -18px;"/>
    </div>
</div>
